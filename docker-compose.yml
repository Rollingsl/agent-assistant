version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: opas_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: opas_frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
