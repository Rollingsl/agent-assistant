  <circle 
    cx="50" 
    cy="50" 
    r="8" 
    fill="url(#logoGradient)" 
    filter="url(#glow)"
  />
  
  <circle cx="50" cy="20" r="2" fill="#00f2fe" />
  <circle cx="76" cy="35" r="2" fill="#00f2fe" />
  <circle cx="76" cy="65" r="2" fill="#00f2fe" />
  <circle cx="50" cy="80" r="2" fill="#00f2fe" />
  <circle cx="24" cy="65" r="2" fill="#00f2fe" />
